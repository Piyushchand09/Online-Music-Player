<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spindle — Online Music Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stage">

  <main class="console" aria-label="Music player">
    <!-- Brass corner screws -->
    <span class="screw tl" aria-hidden="true"></span>
    <span class="screw tr" aria-hidden="true"></span>
    <span class="screw bl" aria-hidden="true"></span>
    <span class="screw br" aria-hidden="true"></span>

    <div class="console-brand">
      <span class="brand-mark">◎</span>
      <span class="brand-name">SPINDLE</span>
      <span class="brand-tag">MODEL&nbsp;II</span>
    </div>

    <div class="deck">
      <div class="platter-wrap">
        <div class="platter" id="platter">
          <div class="platter-grooves"></div>
          <div class="platter-label" id="platterLabel">
            <span id="labelInitial">S</span>
          </div>
        </div>
        <div class="tonearm" id="tonearm"></div>
      </div>

      <canvas id="visualizer" class="visualizer" aria-hidden="true"></canvas>
    </div>

    <div class="track-info">
      <h1 id="trackTitle" class="track-title">No track loaded</h1>
      <p id="trackArtist" class="track-artist">Add music from your device to begin</p>
    </div>

    <div class="progress-row">
      <span class="time-readout" id="currentTime">0:00</span>
      <input type="range" id="progressBar" class="slider progress-slider" min="0" max="1000" value="0" step="1"
             aria-label="Seek position">
      <span class="time-readout" id="durationTime">0:00</span>
    </div>

    <div class="controls-row">
      <button class="icon-btn" id="shuffleBtn" title="Shuffle" aria-pressed="false" aria-label="Toggle shuffle">
        <svg viewBox="0 0 24 24"><path d="M3 6h3.5c1.5 0 2.4.7 3.3 2l.4.6M3 18h3.5c1.5 0 2.4-.7 3.3-2l4.4-6c.9-1.3 1.8-2 3.3-2H21M17.5 4 21 6l-3.5 2M17.5 22 21 20l-3.5-2"/></svg>
      </button>

      <button class="icon-btn transport" id="prevBtn" title="Previous track" aria-label="Previous track">
        <svg viewBox="0 0 24 24"><path d="M6 5v14M19 5 8 12l11 7V5Z"/></svg>
      </button>

      <button class="play-btn" id="playBtn" aria-label="Play">
        <svg id="playIcon" viewBox="0 0 24 24"><path d="M7 5v14l12-7L7 5Z"/></svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" hidden><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg>
      </button>

      <button class="icon-btn transport" id="nextBtn" title="Next track" aria-label="Next track">
        <svg viewBox="0 0 24 24"><path d="M18 5v14M5 5l11 7-11 7V5Z"/></svg>
      </button>

      <button class="icon-btn" id="repeatBtn" title="Repeat" aria-pressed="false" aria-label="Toggle repeat">
        <svg viewBox="0 0 24 24"><path d="M17 2l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 22l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>

    <div class="volume-row">
      <button class="icon-btn small" id="muteBtn" aria-label="Mute">
        <svg id="volIcon" viewBox="0 0 24 24"><path d="M4 9v6h4l5 5V4L8 9H4Z"/><path d="M16.5 8.5a5 5 0 0 1 0 7"/><path d="M19 6a8.5 8.5 0 0 1 0 12"/></svg>
        <svg id="muteIcon" viewBox="0 0 24 24" hidden><path d="M4 9v6h4l5 5V4L8 9H4Z"/><path d="M17 9l5 6M22 9l-5 6"/></svg>
      </button>
      <input type="range" id="volumeSlider" class="slider volume-slider" min="0" max="100" value="75"
             aria-label="Volume">
    </div>
  </main>

  <aside class="playlist-panel" aria-label="Playlist">
    <div class="playlist-header">
      <h2>Now Queued</h2>
      <label class="add-btn" for="fileInput">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Add music
      </label>
      <input type="file" id="fileInput" accept="audio/*" multiple hidden>
    </div>

    <ul id="playlistItems" class="playlist-items">
      <li class="empty-state" id="emptyState">
        Your queue is empty. Load a few tracks from your device to start spinning.
      </li>
    </ul>
  </aside>

</div>

<audio id="audioPlayer" preload="metadata"></audio>

<script src="script.js"></script>
</body>
</html>
